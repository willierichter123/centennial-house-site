    <style>
      /* ── Gallery grid ─────────────────────────────────────────── */
      .photo-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
      }
      .photo-item {
        position: relative;
        overflow: hidden;
        cursor: zoom-in;
        background: var(--tile);
      }
      .photo-item:focus-visible {
        outline: 3px solid var(--accent-deep);
        outline-offset: 0.2rem;
      }
      .photo-item[hidden] { display: none; }
      .photo-item img {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        transition: transform 500ms ease, opacity 350ms ease;
        opacity: 0;
      }
      .photo-item img.loaded { opacity: 1; }
      .photo-item:hover img { transform: scale(1.05); }
      .photo-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(17,16,15,0.6) 0%, transparent 55%);
        opacity: 0;
        transition: opacity 260ms ease;
        display: flex;
        align-items: flex-end;
        padding: 0.85rem 1rem;
        pointer-events: none;
      }
      .photo-item:hover .photo-overlay { opacity: 1; }
      .photo-item:focus-visible .photo-overlay { opacity: 1; }
      .photo-label {
        font-family: var(--font-body);
        font-size: 0.63rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.9);
        line-height: 1;
      }

      /* ── Lightbox ─────────────────────────────────────────────── */
      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 900;
        background: rgba(14,13,12,0.97);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 220ms ease;
      }
      .lightbox.is-open { opacity: 1; pointer-events: all; }
      .lightbox-stage {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 5.5rem;
        box-sizing: border-box;
      }
      .lightbox-img-wrap img {
        max-width: 100%;
        max-height: calc(100dvh - 8rem);
        object-fit: contain;
        display: block;
        transition: opacity 180ms ease;
      }
      .lightbox-img-wrap img.fading { opacity: 0; }
      .lb-btn {
        position: absolute;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.2);
        color: rgba(255,255,255,0.75);
        cursor: pointer;
        transition: border-color 150ms ease, color 150ms ease;
        line-height: 1;
      }
      .lb-btn:hover { border-color: rgba(255,255,255,0.65); color: #fff; }
      .lb-btn:focus-visible { outline: 3px solid #fff; outline-offset: 0.18rem; border-color: rgba(255,255,255,0.9); color: #fff; }
      .lb-close { top: 1.25rem; right: 1.5rem; width: 2.75rem; height: 2.75rem; font-size: 1rem; font-weight: 300; }
      .lb-prev, .lb-next { top: 50%; transform: translateY(-50%); width: 2.75rem; height: 2.75rem; font-size: 0.95rem; }
      .lb-prev { left: 1.5rem; }
      .lb-next { right: 1.5rem; }
      .lb-counter {
        position: absolute;
        top: 1.6rem; left: 50%; transform: translateX(-50%);
        font-family: var(--font-body); font-size: 0.62rem; font-weight: 600;
        letter-spacing: 0.12em; color: rgba(255,255,255,0.35);
        white-space: nowrap; pointer-events: none;
      }
      .lb-caption {
        position: absolute;
        bottom: 1.5rem; left: 50%; transform: translateX(-50%);
        font-family: var(--font-body); font-size: 0.62rem; font-weight: 700;
        letter-spacing: 0.12em; text-transform: uppercase;
        color: rgba(255,255,255,0.4); white-space: nowrap; pointer-events: none;
      }

      @media (max-width: 720px) {
        .photo-grid { grid-template-columns: 1fr 1fr; gap: 0.4rem; }
        .lightbox-stage { padding: 3.5rem 1rem; }
        .lb-prev, .lb-next { display: none; }
      }
      @media (max-width: 420px) {
        .photo-grid { grid-template-columns: 1fr; }
      }
    </style>

    <script>
      // Fade-in on load
      document.querySelectorAll('.photo-item img').forEach(img => {
        if (img.complete) img.classList.add('loaded');
        else img.addEventListener('load', () => img.classList.add('loaded'));
      });

      // Filter
      const items = Array.from(document.querySelectorAll('.photo-item'));
      const filterBtns = Array.from(document.querySelectorAll('.room-filter'));
      let activeFilter = 'all';

      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          activeFilter = btn.dataset.filter;
          filterBtns.forEach(b => {
            const isActive = b === btn;
            b.classList.toggle('is-active', isActive);
            b.setAttribute('aria-pressed', isActive ? 'true' : 'false');
          });
          items.forEach(item => {
            item.hidden = activeFilter !== 'all' && item.dataset.category !== activeFilter;
          });
        });
      });

      // Lightbox
      const lightbox = document.getElementById('lightbox');
      const lbImg = document.getElementById('lb-img');
      const lbCaption = document.getElementById('lb-caption');
      const lbCounter = document.getElementById('lb-counter');
      let current = 0;
      let lastFocusedItem = null;
      const focusableSelector = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';

      const visible = () => items.filter(i => !i.hidden);

      function getFocusableNodes() {
        return Array.from(lightbox.querySelectorAll(focusableSelector))
          .filter(node => !node.hasAttribute('disabled') && !node.hidden);
      }

      function open(item) {
        lastFocusedItem = item;
        current = visible().indexOf(item);
        show(current);
        lightbox.classList.add('is-open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        window.setTimeout(() => document.getElementById('lb-close').focus(), 0);
      }

      function close() {
        lightbox.classList.remove('is-open');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        if (lastFocusedItem) lastFocusedItem.focus();
      }

      function show(idx) {
        const vis = visible();
        current = (idx + vis.length) % vis.length;
        const item = vis[current];
        lbImg.classList.add('fading');
        setTimeout(() => {
          lbImg.src = item.querySelector('img').src;
          lbImg.alt = item.querySelector('img').alt;
          lbCaption.textContent = item.dataset.label || '';
          lbCounter.textContent = (current + 1) + ' / ' + vis.length;
          lbImg.classList.remove('fading');
        }, 160);
      }

      items.forEach(item => {
        item.addEventListener('click', () => open(item));
        item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(item); } });
      });

      document.getElementById('lb-close').addEventListener('click', close);
      document.getElementById('lb-prev').addEventListener('click', () => show(current - 1));
      document.getElementById('lb-next').addEventListener('click', () => show(current + 1));
      lightbox.addEventListener('click', e => { if (e.target === lightbox || e.target.classList.contains('lightbox-stage')) close(); });

      document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('is-open')) return;
        if (e.key === 'Escape') close();
        if (e.key === 'ArrowLeft') show(current - 1);
        if (e.key === 'ArrowRight') show(current + 1);
        if (e.key === 'Tab') {
          const focusableNodes = getFocusableNodes();
          if (!focusableNodes.length) return;
          const first = focusableNodes[0];
          const last = focusableNodes[focusableNodes.length - 1];

          if (e.shiftKey && document.activeElement === first) {
            e.preventDefault();
            last.focus();
          } else if (!e.shiftKey && document.activeElement === last) {
            e.preventDefault();
            first.focus();
          }
        }
      });
    </script>
